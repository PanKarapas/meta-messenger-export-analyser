<div class="virtualScrollContainer">
    <cdk-virtual-scroll-viewport class="scrollable" [itemSize]="52" [maxBufferPx]="1200" [minBufferPx]="400">
        <table mat-table [dataSource]="dataSource()" [trackBy]="trackBy" matSort matSortActive="frequency"
            matSortDirection="desc" matSortDisableClear class="mat-elevation-z8">
            <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

            <ng-container matColumnDef="index">
                <th mat-header-cell *matHeaderCellDef>#</th>
                <td mat-cell *matCellDef="let index = index" class="tableWrap"> {{index}} </td>
            </ng-container>

            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef mat-sort-header>{{nameHeader()}}</th>
                <td mat-cell *matCellDef="let element" class="tableWrap" [matTooltip]="element.name"
                    [matTooltipShowDelay]="500"> {{element.name}} </td>
            </ng-container>

            <ng-container matColumnDef="count">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Count </th>
                <td mat-cell *matCellDef="let element" class="tableWrap"> {{element.count}} </td>
            </ng-container>

            <ng-container matColumnDef="frequency">
                <th mat-header-cell *matHeaderCellDef mat-sort-header> Frequency </th>
                <td mat-cell *matCellDef="let element"> {{element.frequency.toLocaleString(undefined,{style: 'percent',
                    minimumFractionDigits:2})}} </td>
            </ng-container>
        </table>
    </cdk-virtual-scroll-viewport>
</div>
