<mat-tab-group mat-stretch-tabs="true" mat-align-tabs="start" animationDuration="100">
    <mat-tab label="People">
        <div class="panel">
            <table mat-table [dataSource]="participantMessagesDataSource" matSort matSortActive="totalCount"
                matSortDirection="desc" matSortDisableClear class="mat-elevation-z8">
                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

                <ng-container matColumnDef="name">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Name</th>
                    <td mat-cell *matCellDef="let element"> 
                        <a href="/results/participant/{{element.name}}">{{element.name}}</a> 
                    </td>
                </ng-container>

                <ng-container matColumnDef="textCount">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Text msg count </th>
                    <td mat-cell *matCellDef="let element"> {{element.textCount}} </td>
                </ng-container>

                <ng-container matColumnDef="mediaCount">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Media count </th>
                    <td mat-cell *matCellDef="let element"> {{element.mediaCount}} </td>
                </ng-container>

                <ng-container matColumnDef="reactionCount">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Reaction count </th>
                    <td mat-cell *matCellDef="let element"> {{element.reactionCount}} </td>
                </ng-container>

                <ng-container matColumnDef="totalCount">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header> Total count </th>
                    <td mat-cell *matCellDef="let element"> {{element.totalCount}} </td>
                </ng-container>
            </table>
        </div>
    </mat-tab>
    <mat-tab label="Chats">Content 2</mat-tab>
</mat-tab-group>
